name: build-test

# Builds the gem through a host O3DE project and runs its unit tests.
#
# This needs the full O3DE 26.05 SDK, a host project, and 3rdParty packages,
# which GitHub-hosted runners do not have. It therefore runs ONLY on a
# self-hosted runner labelled `o3de` (see docs/ci-self-hosted-runner.md for
# setup). It is opt-in: triggered manually, or on PRs/pushes that a maintainer
# has labelled, so ordinary contributors are never blocked by missing hardware.
#
# The lint workflow (lint.yml) remains the always-on gate on GitHub-hosted
# runners; this one is the heavier, environment-dependent complement.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-test:
    name: build and unit test
    # Only attempt on a self-hosted runner that advertises the O3DE SDK. The
    # PR path additionally requires the `ci:build` label so the heavy job runs
    # only when a maintainer asks for it.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:build')
    runs-on: [self-hosted, o3de]
    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        run: |
          echo "engine : ${O3DE_ENGINE_PATH:-<unset>}"
          echo "project: ${DIORAMA_PROJECT:-<unset>}"
          echo "runner : $(uname -a)"

      - name: Build and test
        # O3DE_ENGINE_PATH and DIORAMA_PROJECT are provided by the self-hosted
        # runner's environment (or repo/organization variables). GEM_PATH
        # defaults to this checkout.
        env:
          O3DE_ENGINE_PATH: ${{ vars.O3DE_ENGINE_PATH }}
          DIORAMA_PROJECT: ${{ vars.DIORAMA_PROJECT }}
          BUILD_CONFIG: profile
          TEST_FILTER: "SpriteUVTest.*:SpriteAnimationTest.*:SpriteBatchPlanTest.*"
        run: ./scripts/ci_build_test.sh
