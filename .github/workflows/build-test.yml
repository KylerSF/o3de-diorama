name: build-test

# Builds the gem through a host O3DE project and runs its unit tests.
#
# This needs the full O3DE 26.05 SDK and a host project. Both legs run entirely
# on free GitHub-hosted runners (no self-hosted hardware), so untrusted PR code
# never touches local machines. They provision the SDK two ways:
#
# Linux (`ci:build-linux` label, or dispatch leg=linux/both) runs INSIDE a
# `container:` (ci/Containerfile: Fedora 44 + the O3DE SDK, published to ghcr.io
# by ci-image.yml). The image's glibc/3rdParty match the SDK exactly (a stock
# Ubuntu runner cannot even load AzTestRunner).
#
# Windows (`ci:build` label, or a manual dispatch, which defaults to `windows`)
# runs on the windows-2025-vs2026 image and installs the O3DE 26.05 Windows SDK at runtime from
# the official installer. Windows is O3DE's primary platform, so it is the gate
# that confirms the gem builds and tests there.
#
# Both legs run automatically on any PR that touches buildable code (the `changes`
# job below detects this), so a code change can never merge without compiling on
# both verified platforms. The `ci:build` / `ci:build-linux` labels remain as a
# manual override to force a leg on a PR the path filter skipped (for example a
# docs-only PR), and a workflow_dispatch runs either leg on demand. Build
# verification needs no GPU, so neither leg needs special hardware.
#
# The lint workflow (lint.yml) is the always-on gate; this one is the heavier,
# SDK-dependent complement.

on:
  workflow_dispatch:
    inputs:
      leg:
        description: Which OS leg(s) to run on a manual dispatch
        type: choice
        options: [both, linux, windows]
        # Default to windows: it is the active gate. The Linux leg runs on a
        # GitHub-hosted container and is available any time via linux/both.
        default: windows
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

# Supersede in-progress runs of the same ref: a new push or label re-run cancels
# the previous one instead of leaving both to finish.
concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect code changes
    # Cheap gate (~10 s checkout + grep): decides whether a PR touches buildable
    # code, so the heavy legs auto-run only when they need to. Non-PR events fall
    # through with code=false; their build conditions key off the dispatch inputs.
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA"...HEAD)
          echo "Changed files:"; echo "$changed"
          # Buildable surface: gem sources, any CMake list, the gem manifest, and
          # the build scripts / this workflow themselves (so CI changes self-test).
          if echo "$changed" | grep -qE '^(Code/|gem\.json$|CMakeLists\.txt$|.*\.cmake$|scripts/ci_build_test\.(sh|ps1)$|\.github/workflows/build-test\.yml$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "-> code paths touched: build legs will run."
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "-> no code paths touched: build legs skipped (label to force)."
          fi

  build-test-linux:
    name: build and unit test (Linux)
    needs: changes
    # Auto-runs when the PR touches code; the DISTINCT `ci:build-linux` label (not
    # the general `ci:build`, which fires Windows only) forces it otherwise. Runs
    # on a GitHub-hosted runner inside the ci-fedora container, so the SDK is
    # present and untrusted PR code never touches local hardware.
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.leg == 'both' || inputs.leg == 'linux')) ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.code == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'ci:build-linux')))
    runs-on: ubuntu-latest
    container:
      # Fedora 44 + O3DE SDK, published by ci-image.yml. Credentials let the job
      # pull it while the repo/package is private; once the package is made
      # public they become unnecessary (and fork PRs can pull it too).
      image: ghcr.io/${{ github.repository }}/ci-fedora:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Build and test
        # Engine and host project are baked into the container image at fixed
        # paths; GEM_PATH defaults to this checkout.
        env:
          O3DE_ENGINE_PATH: /opt/O3DE/26.05.0
          DIORAMA_PROJECT: /opt/diorama-host
          BUILD_CONFIG: profile
          # Run the whole suite: the tests are sub-second (the build is the cost),
          # so the gate exercises every Diorama test, not a subset.
          TEST_FILTER: "*"
        run: ./scripts/ci_build_test.sh

  build-test-windows:
    name: build and unit test (Windows)
    needs: changes
    # Auto-runs when the PR touches code; the `ci:build` label (or a manual
    # dispatch) forces it otherwise. Runs on a GitHub-hosted windows-2025-vs2026
    # runner and installs the O3DE SDK at runtime, so no self-hosted hardware is
    # needed and untrusted PR code stays off local machines. Windows is O3DE's
    # primary platform, so this confirms the gem builds and tests there.
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.leg == 'both' || inputs.leg == 'windows')) ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.code == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'ci:build')))
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v6

      - name: Cache O3DE SDK and 3rdParty
        id: o3de-cache
        uses: actions/cache@v4
        with:
          # the windows runner runs as 'runneradmin'. Cache the installed SDK plus the
          # engine's downloaded 3rdParty packages and Python venv, so reruns skip
          # both the ~2.4 GB SDK install and the multi-GB 3rdParty download that
          # configure does otherwise. Bump the key suffix to invalidate.
          path: |
            C:\O3DE\26.05
            C:\Users\runneradmin\.o3de\3rdParty
            C:\Users\runneradmin\.o3de\Python
          key: o3de-win-2026-05-23-8e750500f-v1

      - name: Install O3DE 26.05 SDK
        # The official "Latest" Windows installer is a WiX Burn web bootstrapper,
        # but upstream republished the MSI without updating the bootstrapper's
        # embedded hash, so Burn aborts with 0x80091007 (hash mismatch) before it
        # can install. We therefore bypass the bootstrapper: download the MSI and
        # its external CABs from the same pinned build and install with msiexec,
        # which has no such hash gate. The pinned build also makes CI reproducible.
        # NOTE: if this build is ever pruned from o3debinaries.org, refresh BUILD
        # to a current stabilization-26050 snapshot.
        shell: pwsh
        env:
          O3DE_BASE_URL: https://www.o3debinaries.org/stabilization-26050/2026-05-23-8e750500f/Windows
          CACHE_HIT: ${{ steps.o3de-cache.outputs.cache-hit }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:CACHE_HIT -eq 'true') {
            Write-Host "SDK restored from cache; skipping download and install."
          } else {
            $ProgressPreference = 'SilentlyContinue'   # IWR is glacial with the progress bar on
            $base = $env:O3DE_BASE_URL
            $dir  = 'C:\o3de-pkg'
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
            $files = @('o3de_26.05.msi') + (1..29 | ForEach-Object { "cab$_.cab" })
            Write-Host "Downloading $($files.Count) package files (~2.4 GB)..."
            $files | ForEach-Object -ThrottleLimit 8 -Parallel {
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri "$using:base/$_" -OutFile (Join-Path $using:dir $_)
            }
            $sum = (Get-ChildItem $dir | Measure-Object -Property Length -Sum).Sum
            Write-Host ("Downloaded {0:N2} GB" -f ($sum / 1GB))

            $msi  = Join-Path $dir 'o3de_26.05.msi'
            $mlog = 'C:\o3de-msi.log'
            # Install to a SPACE-FREE path. The MSI default is C:\Program Files\O3DE,
            # but O3DE's LYPython.cmake builds the pip command with an unquoted
            # interpreter path, so a space in the engine path breaks configure
            # ("'C:/Program' is not recognized"). INSTALL_ROOT (a public MSI
            # property) overrides the location.
            Write-Host "Installing via msiexec..."
            $m = Start-Process msiexec -ArgumentList '/i',"`"$msi`"",'INSTALL_ROOT=C:\O3DE\26.05','/qn','/norestart','/l*v',$mlog -Wait -PassThru
            Write-Host "msiexec exit code: $($m.ExitCode)"
            if ($m.ExitCode -ne 0 -and $m.ExitCode -ne 3010) {
              if (Test-Path $mlog) { Write-Host "----- msiexec log (tail) -----"; Get-Content $mlog -Tail 120 }
              throw "msiexec failed with exit code $($m.ExitCode)"
            }
          }
          $roots = @('C:\O3DE', "$env:ProgramFiles\O3DE", "${env:ProgramFiles(x86)}\O3DE")
          $engine = $null
          foreach ($r in $roots) {
            if (Test-Path $r) {
              $engine = Get-ChildItem $r -Directory -ErrorAction SilentlyContinue |
                Where-Object { Test-Path (Join-Path $_.FullName 'scripts\o3de.bat') } |
                Select-Object -First 1 -ExpandProperty FullName
              if ($engine) { break }
            }
          }
          if (-not $engine) { throw "could not locate an O3DE engine (scripts\o3de.bat) under: $($roots -join ', ')" }
          Write-Host "engine: $engine"
          # A fresh runner profile has no engine registered in ~/.o3de, and a /qn
          # msiexec install does not self-register, so CMake's EngineFinder cannot
          # locate the engine. Register it before any configure.
          Write-Host "Registering engine..."
          & "$engine\scripts\o3de.bat" register --this-engine
          if ($LASTEXITCODE -ne 0) { throw "engine registration failed ($LASTEXITCODE)" }
          "O3DE_ENGINE_PATH=$engine" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create host project
        # A throwaway project to build the gem through; mirrors the baked
        # /opt/diorama-host in the Linux container.
        shell: pwsh
        run: |
          $proj = 'C:\diorama-host'
          & "$env:O3DE_ENGINE_PATH\scripts\o3de.bat" create-project `
            --project-path $proj --project-name DioramaHost --template-name MinimalProject
          if ($LASTEXITCODE -ne 0) { throw "create-project failed ($LASTEXITCODE)" }
          "DIORAMA_PROJECT=$proj" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build and test
        shell: pwsh
        env:
          BUILD_CONFIG: profile
          # Run the whole suite: the tests are sub-second (the build is the cost),
          # so the gate exercises every Diorama test, not a subset.
          TEST_FILTER: "*"
        run: .\scripts\ci_build_test.ps1
