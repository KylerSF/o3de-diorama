name: build-test

# Builds the gem through a host O3DE project and runs its unit tests.
#
# This needs the full O3DE 26.05 SDK, a host project, and 3rdParty packages,
# which GitHub-hosted runners do not have. It therefore runs ONLY on self-hosted
# runners labelled `o3de` (see docs/ci-self-hosted-runner.md for setup). It is
# opt-in: triggered manually, or on PRs/pushes that a maintainer has labelled, so
# ordinary contributors are never blocked by missing hardware.
#
# Two legs. Windows (`[self-hosted, o3de, windows]`, ci_build_test.ps1) is the
# active gate: the `ci:build` label (or a manual dispatch, which defaults to
# `windows`) runs it on the online Windows runner. Linux (`[self-hosted, o3de,
# Linux]`, ci_build_test.sh) is separately opt-in via the `ci:build-linux` label
# (or dispatch leg=linux/both) because no Linux `o3de` runner exists yet. A job
# whose `if` is true but whose `runs-on` labels match no online runner does NOT
# skip, it queues until one appears; gating Linux behind its own label keeps an
# ordinary `ci:build` from leaving a Linux job hung with no runner. Windows is
# O3DE's primary platform, so it is the gate that confirms the gem builds there.
#
# The lint workflow (lint.yml) remains the always-on gate on GitHub-hosted
# runners; this one is the heavier, environment-dependent complement.

on:
  workflow_dispatch:
    inputs:
      leg:
        description: Which OS leg(s) to run on a manual dispatch
        type: choice
        options: [both, linux, windows]
        # Default to windows only: it has an online runner. Choose linux/both
        # explicitly once a Linux self-hosted runner exists, else the Linux job
        # queues with no runner to pick it up.
        default: windows
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-test-linux:
    name: build and unit test (Linux)
    # Opt-in and pinned to a Linux self-hosted runner. The PR path requires a
    # DISTINCT `ci:build-linux` label (not the general `ci:build`, which fires
    # Windows only) because no Linux `o3de` runner exists yet: with the common
    # label, this job would queue forever waiting for a runner. Add
    # `ci:build-linux` (or dispatch with leg=linux/both) only once a Linux runner
    # is online. The `Linux` label keeps a Windows `o3de` runner from grabbing
    # this bash job.
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.leg == 'both' || inputs.leg == 'linux')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:build-linux'))
    runs-on: [self-hosted, o3de, Linux]
    steps:
      - uses: actions/checkout@v6

      - name: Show environment
        # Print only whether the config is present, not the paths/host, so public
        # logs on this public repo do not advertise local environment details.
        run: |
          echo "engine : $([ -n "${O3DE_ENGINE_PATH}" ] && echo set || echo '<unset>')"
          echo "project: $([ -n "${DIORAMA_PROJECT}" ] && echo set || echo '<unset>')"

      - name: Build and test
        # O3DE_ENGINE_PATH and DIORAMA_PROJECT are provided by the self-hosted
        # runner's environment (or repo/organization variables). GEM_PATH
        # defaults to this checkout.
        env:
          O3DE_ENGINE_PATH: ${{ vars.O3DE_ENGINE_PATH }}
          DIORAMA_PROJECT: ${{ vars.DIORAMA_PROJECT }}
          BUILD_CONFIG: profile
          # Run the whole suite: the tests are sub-second (the build is the cost),
          # so the gate exercises every Diorama test, not a subset.
          TEST_FILTER: "*"
        run: ./scripts/ci_build_test.sh

  build-test-windows:
    name: build and unit test (Windows)
    # Gated identically to the Linux leg. Requires a self-hosted Windows runner
    # labelled `o3de` + `windows` with the O3DE SDK and a host project; until one
    # is online this job is simply queued/skipped and never blocks a PR. Windows
    # is O3DE's primary platform, so this confirms the gem builds and tests there.
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.leg == 'both' || inputs.leg == 'windows')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:build'))
    runs-on: [self-hosted, o3de, windows]
    steps:
      - uses: actions/checkout@v6

      - name: Show environment
        # Print only whether the config is present, not the paths/host, so public
        # logs on this public repo do not advertise local environment details.
        shell: pwsh
        run: |
          Write-Host "engine : $(if ($env:O3DE_ENGINE_PATH) {'set'} else {'<unset>'})"
          Write-Host "project: $(if ($env:DIORAMA_PROJECT) {'set'} else {'<unset>'})"

      - name: Build and test
        # Variables can be Windows-specific (e.g. an O3DE_ENGINE_PATH_WINDOWS)
        # if the Linux and Windows runners share the repo; fall back to the
        # common ones otherwise.
        shell: pwsh
        env:
          O3DE_ENGINE_PATH: ${{ vars.O3DE_ENGINE_PATH_WINDOWS || vars.O3DE_ENGINE_PATH }}
          DIORAMA_PROJECT: ${{ vars.DIORAMA_PROJECT_WINDOWS || vars.DIORAMA_PROJECT }}
          BUILD_CONFIG: profile
          # Run the whole suite: the tests are sub-second (the build is the cost),
          # so the gate exercises every Diorama test, not a subset.
          TEST_FILTER: "*"
        run: .\scripts\ci_build_test.ps1
