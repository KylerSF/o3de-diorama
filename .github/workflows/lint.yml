name: lint

# Lightweight, engine-free checks. Building Diorama or running its tests requires
# the full O3DE SDK, so build/test CI is handled separately (see the README
# roadmap). These checks run in seconds on a standard runner.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check C++ formatting
        run: |
          files=$(find Code -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.inl' \))
          if [ -z "$files" ]; then echo "No C++ files found"; exit 0; fi
          echo "$files" | xargs clang-format --dry-run --Werror

  spdx-headers:
    name: spdx-headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX license headers
        run: ./scripts/check_spdx_headers.sh

  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trailing whitespace and EOF newlines
        run: |
          status=0
          while IFS= read -r f; do
            case "$f" in
              *.png|*.jpg|*.jpeg|*.gif|*.ico|*.pdf) continue ;;
            esac
            if [ -f "$f" ] && grep -nIE ' +$' "$f"; then
              echo "::error file=$f::trailing whitespace"; status=1
            fi
            if [ -s "$f" ] && [ -n "$(tail -c1 "$f")" ]; then
              echo "::error file=$f::missing newline at end of file"; status=1
            fi
          done < <(git ls-files)
          exit $status

  json-valid:
    name: json-valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: |
          status=0
          while IFS= read -r f; do
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error file=$f::invalid JSON"; status=1
            fi
          done < <(git ls-files '*.json' '*.setreg')
          exit $status
